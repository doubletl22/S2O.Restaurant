version: '3.8'

services:

  postgres:
    image: postgres:15-alpine
    container_name: s2o.postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - s2o-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: s2o.rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - s2o-network
   
  identity-api:
    volumes:
      - ./infra/keys:/root/.aspnet/DataProtection-Keys
    build:
      context: .
      dockerfile: src/Services/Identity/S2O.Identity.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker__Host=rabbitmq
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Identity_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
      - Cloudinary__CloudName=demo
      - Cloudinary__ApiKey=demo
      - Cloudinary__ApiSecret=demo
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "5001:8080"
    networks:
      - s2o-network

  catalog-api:
    build:
      context: .
      dockerfile: src/Services/Catalog/S2O.Catalog.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Catalog_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
      - Cloudinary__CloudName=demo
      - Cloudinary__ApiKey=demo
      - Cloudinary__ApiSecret=demo
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:8080"
    networks:
      - s2o-network
    
  order-api:
    build:
      context: .
      dockerfile: src/Services/Order/S2O.Order.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Order_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
      - Cloudinary__CloudName=demo
      - Cloudinary__ApiKey=demo
      - Cloudinary__ApiSecret=demo
      - ExternalServices__CatalogUrl=http://catalog-api:8080
      - ExternalServices__TenantUrl=http://tenant-api:8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5003:8080"
    networks:
      - s2o-network

  tenant-api:
    volumes:
      - ./infra/keys:/root/.aspnet/DataProtection-Keys
    build:
      context: .
      dockerfile: src/Services/Tenant/S2O.Tenant.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - MessageBroker__Host=rabbitmq
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Tenant_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
      - ExternalServices__IdentityApiBaseUrl=http://identity-api:8080
      - ExternalServices__CatalogApiBaseUrl=http://catalog-api:8080
      - ExternalServices__OrderApiBaseUrl=http://order-api:8080
      - ExternalServices__BookingApiBaseUrl=http://booking-api:8080
      - ExternalServices__PaymentApiBaseUrl=http://payment-api:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    ports:
      - "5004:8080"
    networks:
      - s2o-network

  booking-api:
    build:
      context: .
      dockerfile: src/Services/Booking/S2O.Booking.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Booking_Db;User Id=postgres;Password=postgres123
      - ConnectionStrings__TenantConnection=Server=postgres;Port=5432;Database=S2O_Tenant_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5005:8080"
    networks:
      - s2o-network

  payment-api:
    build:
      context: .
      dockerfile: src/Services/Payment/S2O.Payment.Api/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=postgres;Port=5432;Database=S2O_Payment_Db;User Id=postgres;Password=postgres123
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5006:8080"
    networks:
      - s2o-network

  gateway:
    build:
      context: .
      dockerfile: src/Gateways/S2O.GateWay/Dockerfile
    environment:
      - DOTNET_SYSTEM_NET_DISABLEIPV6=1
      - ASPNETCORE_ENVIRONMENT=Development
      - Jwt__Key=S2O_Super_Secret_Key_For_Identity_Service_2026
      - Jwt__Issuer=S2O.Identity
      - Jwt__Audience=S2O.Restaurant
      - Cloudinary__CloudName=demo
      - Cloudinary__ApiKey=demo
      - Cloudinary__ApiSecret=demo
    ports:
      - "5000:8080"
    depends_on:
      - identity-api
      - catalog-api
      - order-api
      - tenant-api
      - booking-api
      - payment-api
    networks:
      - s2o-network

volumes:
  postgres_data:

networks:
  s2o-network:
    driver: bridge