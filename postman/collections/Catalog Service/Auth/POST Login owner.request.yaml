$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "password": "{{password}}"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Login success", function () {
        pm.response.to.have.status(200);
      });

      const res = pm.response.json();
      pm.environment.set("ownerToken", res.accessToken);

      const payloadPart = res.accessToken.split(".")[1]
        .replace(/-/g, "+")
        .replace(/_/g, "/");
      const padded = payloadPart + "=".repeat((4 - payloadPart.length % 4) % 4);
      const payload = JSON.parse(atob(padded));

      if (payload.tenant_id) pm.environment.set("tenant_id", payload.tenant_id);
      if (payload.branch_id) pm.environment.set("branch_id", payload.branch_id);
    language: text/javascript
order: 1000
