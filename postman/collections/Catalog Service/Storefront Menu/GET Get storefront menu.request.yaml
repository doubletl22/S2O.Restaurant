$kind: http-request
url: "{{baseUrl}}/api/v1/storefront/menus/{{tenantId}}"
method: GET
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Storefront menu success", function () {
        pm.expect(pm.response.code).to.be.oneOf([200, 204]);
      });
    language: text/javascript
order: 1000
