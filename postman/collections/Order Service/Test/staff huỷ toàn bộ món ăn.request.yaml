$kind: http-request
name: staff huỷ toàn bộ món ăn
url: "{{baseUrl}}/api/v1/orders/{{lastOrderId}}/cancel"
method: POST
body:
  type: json
  content: |-
    {
        "orderId": "{{orderId}}",
        "reason": "Khách đổi ý không muốn ăn nữa"
    }
auth:
  type: bearer
  credentials:
    token: "{{token}}"
scripts:
  - type: afterResponse
    code: >-
      // 1. Kiểm tra API gọi thành công không bị lỗi (Status 200 OK)

      pm.test("Hủy đơn hàng thành công (Status 200)", function () {
          pm.response.to.have.status(200);
      });


      // 2. Kiểm tra nghiệp vụ: Server thực sự xác nhận đã hủy

      pm.test("Hệ thống xác nhận hủy đơn (isSuccess = true)", function () {
          var jsonData = pm.response.json();
          
          // Do CancelOrderCommand trả về kiểu Result, nên ta check trường isSuccess
          pm.expect(jsonData.isSuccess).to.be.true;
      });


      // 3. Dọn dẹp môi trường (Cực kỳ quan trọng khi chạy Automation Test)

      pm.test("Dọn dẹp dữ liệu test cũ", function () {
          // Xóa orderId và itemId khỏi Environment để các lần bấm "Run Collection" sau 
          // không bị dính mã ID cũ đã bị hủy.
          pm.environment.unset("orderId");
          pm.environment.unset("itemId");
          
          console.log("✅ Đã hủy đơn hàng và dọn dẹp biến môi trường thành công!");
      });
    language: text/javascript
order: 4498795667028167
