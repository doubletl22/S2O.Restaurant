$kind: http-request
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
body:
  type: json
  content: "{\r

    \  \"email\": \"{{c_email}}\",\r

    \  \"password\": \"{{c_password}}\"\r

    }"
scripts:
  - type: afterResponse
    code: "let res = {};\r

      try {\r

      \  res = pm.response.json();\r

      } catch (e) {\r

      \  res = {};\r

      }\r

      \r

      // reset biến cũ\r

      pm.collectionVariables.unset(\"c_token\");\r

      pm.collectionVariables.unset(\"stat_totalTenants\");\r

      pm.collectionVariables.unset(\"stat_activeTenants\");\r

      pm.collectionVariables.unset(\"stat_totalRevenue\");\r

      pm.collectionVariables.unset(\"stat_totalUsers\");\r

      pm.collectionVariables.unset(\"stat_storeCount\");\r

      pm.collectionVariables.unset(\"stat_activeStoreCount\");\r

      pm.collectionVariables.unset(\"stat_usersCount\");\r

      \r

      // lấy token từ response\r

      const c_token =\r

      \  res.accessToken ||\r

      \  res.AccessToken ||\r

      \  (res.value && (res.value.accessToken || res.value.AccessToken)) ||\r

      \  \"\";\r

      \r

      pm.test(\"Login admin thành công\", function () {\r

      \  pm.expect(pm.response.code).to.equal(200);\r

      \  pm.expect(c_token).to.be.a(\"string\").and.not.empty;\r

      });\r

      \r

      if (!c_token) {\r

      \  pm.expect.fail(\"Không lấy được c_token\");\r

      }\r

      \r

      // lưu đúng biến collection\r

      pm.collectionVariables.set(\"c_token\", c_token);\r

      \r

      // kiểm tra role admin (nếu backend trả user.roles)\r

      const roles =\r

      \  (res.user && res.user.roles) ||\r

      \  (res.value && res.value.user && res.value.user.roles) ||\r

      \  [];\r

      \r

      if (Array.isArray(roles) && roles.length > 0) {\r

      \  pm.test(\"Đúng role SystemAdmin\", function () {\r

      \    pm.expect(roles).to.include(\"SystemAdmin\");\r

      \  });\r

      }"
    language: text/javascript
order: 1000
